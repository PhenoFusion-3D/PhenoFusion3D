name: Fresh-machine install smoke test

# Goal: prove that `bash launch.sh` reaches the GUI mainloop on a freshly-
# imaged lab box in one shot. We do that by running the launcher inside
# a bare ubuntu:20.04 / ubuntu:22.04 container with nothing preinstalled
# except git/curl/sudo (matching what an ANU lab tech actually hands a
# student). If a future change breaks any link in the install chain
# (Python pick, venv build, pip install, opencv-headless swap, native-lib
# ldd scan, or main.py launch) this workflow turns red BEFORE the change
# merges to howard_dev / main.

on:
  push:
    branches:
      - main
      - howard_dev
  pull_request:
    branches:
      - main
      - howard_dev
  workflow_dispatch:

jobs:
  install-smoke:
    name: ${{ matrix.image }} -> GUI in one shot
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        # Only ubuntu:20.04 -- that's the actual ANU lab box image
        # (Ubuntu 20.04.6 LTS, focal). This is also the harder of the two
        # to provision: the deadsnakes PPA on focal is consistently
        # half-broken (libpython3.10-stdlib visible but the python3.10
        # binary package itself is missing), which forces the launcher
        # down its `uv` fallback path. If 20.04 stays green, the easier
        # 22.04 path almost certainly does too.
        image:
          - ubuntu:20.04

    steps:
      - name: Check out the launcher and supporting code
        uses: actions/checkout@v4

      - name: Smoke test ${{ matrix.image }} (clone + launch.sh end-to-end)
        env:
          IMAGE: ${{ matrix.image }}
          WORKSPACE: ${{ github.workspace }}
        run: |
          set -e
          docker run --rm \
            --network=host \
            -e DEBIAN_FRONTEND=noninteractive \
            -v "$WORKSPACE":/repo:ro \
            "$IMAGE" bash -c '
              set -e

              echo "================ STAGE 1: bare $(. /etc/os-release && echo $PRETTY_NAME) ================"
              echo "python3:   $(command -v python3 || echo NONE)"
              echo "uv:        $(command -v uv || echo NONE)"
              echo "git:       $(command -v git || echo NONE)"
              echo

              echo "================ STAGE 2: install only git / curl / sudo ================"
              apt-get update -qq
              apt-get install -qq -y git curl sudo ca-certificates
              useradd -m -s /bin/bash labuser
              echo "labuser ALL=(ALL) NOPASSWD: ALL" >/etc/sudoers.d/labuser
              echo "installed: git=$(git --version | cut -d\" \" -f3)"
              echo

              echo "================ STAGE 3: clone repo from mounted workspace ================"
              # Mounted workspace is read-only; cloning it creates a fresh
              # working tree under /home/labuser so the launcher can write
              # .venv-linux/ etc. without touching the host workspace.
              sudo -u labuser git clone -q /repo /home/labuser/PhenoFusion3D
              sudo -u labuser bash -c "cd /home/labuser/PhenoFusion3D && git log -1 --format=\"    HEAD: %h %s\""
              echo

              echo "================ STAGE 4: launcher CLI mode (must reach main.py --help) ================"
              if ! sudo -u labuser -H bash -c "cd /home/labuser/PhenoFusion3D && bash launch.sh --help" > /tmp/cli.log 2>&1; then
                  echo "FAIL: launcher exited non-zero in CLI mode"
                  tail -40 /tmp/cli.log
                  exit 1
              fi
              if ! grep -q "usage: main.py" /tmp/cli.log; then
                  echo "FAIL: launcher did not reach main.py --help"
                  tail -40 /tmp/cli.log
                  exit 1
              fi
              echo "PASS: main.py --help reached stdout."
              echo

              echo "================ STAGE 5: launcher GUI mode (offscreen Qt, 15s) ================"
              set +e
              sudo -u labuser -H bash -c "
                  cd /home/labuser/PhenoFusion3D
                  export QT_QPA_PLATFORM=offscreen
                  timeout 15 bash launch.sh > /tmp/gui_stdout.log 2> /tmp/gui_stderr.log
              "
              ec=$?
              echo "    launcher exit: $ec"
              if [ "$ec" -eq 124 ]; then
                  echo "    -> 124 = SIGTERM from timeout = GUI mainloop was running (PASS)"
              elif [ "$ec" -eq 0 ]; then
                  echo "    -> 0 = main.py completed cleanly within 15s (also PASS)"
              else
                  echo "    -> exit $ec = FAIL"
                  echo "--- launcher stderr (last 50 lines) ---"
                  tail -50 /tmp/gui_stderr.log
                  echo "--- launcher stdout (last 20 lines) ---"
                  tail -20 /tmp/gui_stdout.log
                  exit "$ec"
              fi
              echo
              echo "================ ALL STAGES PASSED ================"
            '

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "Smoke test failed. Common causes:"
          echo "  - pyproject.toml dep pin that no longer has a wheel for Python 3.10/3.11/3.12"
          echo "  - Open3D / pyrealsense2 pulled in a new native dep not in launch.sh's SO_TO_PKG map"
          echo "  - opencv-python (with bundled Qt plugins) crept back in as a dep"
          echo "  - launch.sh logged data to stdout instead of stderr inside a \$(...) capture"
          echo "Re-run locally with:"
          echo "  docker run --rm -it -v \$PWD:/repo:ro ${{ matrix.image }} bash"
          echo "  # then inside the container, follow STAGE 1..5 from the workflow."
